# Minimal repro for Tenki npm cache proxy returning 404 on uncached tarballs.
#
# The exact same Setup pnpm pattern used by LuxorLabs/capsule-factory main
# branch (release.yml) — pnpm/action-setup@v6 with no `version:` / no
# `standalone:` overrides. The action internally runs `npm install -g pnpm@latest`
# to bootstrap, which hits the Tenki npm proxy at 192.168.21.57:6990 (configured
# in ~/.npmrc by vm-agent on Tenki runners). When the proxy hasn't pre-cached
# the latest tarball, it returns 404 instead of lazy-fetching from
# registry.npmjs.org, and the step fails with:
#
#   npm error 404 - pnpm-<latest>.tgz is not in this registry.
#
# Trigger manually via the Actions tab → "Repro pnpm proxy 404" → Run workflow.
name: Repro pnpm proxy 404

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repro:
    name: Repro
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Show ~/.npmrc (registry origin)
        run: |
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
          echo "--- npm config get registry ---"
          npm config get registry

      - name: Setup pnpm
        # Exact same pin as LuxorLabs/capsule-factory main release.yml.
        # No version / standalone overrides — reproduces the default behavior.
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - name: Verify pnpm
        # Only reached if Setup pnpm somehow succeeded (i.e. proxy did have
        # the latest tarball cached at the moment).
        run: pnpm --version
