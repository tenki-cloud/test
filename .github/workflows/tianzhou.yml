name: Network Benchmark
on: workflow_dispatch

jobs:
  bench:
    strategy:
      matrix:
        runner: [ubuntu-latest, tenki-standard-small-2c-4g]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Latency to Cloudflare
        run: |
          ping -c 20 1.1.1.1 | tail -1
          curl -o /dev/null -s -w "DNS: %{time_namelookup}s\nConnect: %{time_connect}s\nTTFB: %{time_starttransfer}s\nTotal: %{time_total}s\n" \
            "https://speed.cloudflare.com/__down?bytes=1"

      - name: Bandwidth (upload)
        run: |
          dd if=/dev/urandom of=/tmp/100mb.bin bs=1M count=100 2>/dev/null
          dd if=/dev/urandom of=/tmp/500mb.bin bs=1M count=500 2>/dev/null
          echo "=== 100MB upload ==="
          curl -o /dev/null -s -w "Speed: %{speed_upload} bytes/sec\nTime: %{time_total}s\n" --data-binary @/tmp/100mb.bin https://speed.cloudflare.com/__up
          echo "=== 500MB upload ==="
          curl -o /dev/null -s -w "Speed: %{speed_upload} bytes/sec\nTime: %{time_total}s\n" --data-binary @/tmp/500mb.bin https://speed.cloudflare.com/__up

      - name: Bandwidth (download)
        run: |
          curl -o /dev/null -s -w "Speed: %{speed_download} bytes/sec\nTotal: %{time_total}s\n" \
            "https://speed.cloudflare.com/__down?bytes=500000000"

      - name: Connection stability (sustained transfer)
        run: |
          for i in $(seq 1 10); do
            TIME=$(curl -o /dev/null -s -w "%{time_total}" --max-time 120 --data-binary @/tmp/100mb.bin https://speed.cloudflare.com/__up)
            echo "Run $i: ${TIME}s"
          done

      - name: MTU / packet loss
        continue-on-error: true
        run: |
          ping -c 100 -q 1.1.1.1
          traceroute -m 20 1.1.1.1 || true

      - name: System resources
        run: free -h && df -h /tmp && nproc

      - name: Generate test files
        run: |
          dd if=/dev/urandom of=/tmp/500mb-1.bin bs=1M count=500 2>/dev/null
          dd if=/dev/urandom of=/tmp/500mb-2.bin bs=1M count=500 2>/dev/null
          dd if=/dev/urandom of=/tmp/500mb-3.bin bs=1M count=500 2>/dev/null
          ls -lh /tmp/500mb-*.bin

      - name: Sequential R2 upload (baseline)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          echo "=== Sequential: 3x 500MB uploads ==="
          for i in 1 2 3; do
            echo "--- Upload $i ---"
            free -m | grep Mem
            time aws s3 cp "/tmp/500mb-${i}.bin" "s3://${R2_BUCKET}/bench-seq-${RUNNER_NAME:-unknown}-${i}.bin" \
              --endpoint-url "$R2_ENDPOINT" 2>&1
          done

      - name: Concurrent R2 upload (3 parallel - matches customer workload)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          echo "=== Concurrent: 3x 500MB uploads in parallel ==="
          free -m | grep Mem
          echo "--- Starting 3 parallel uploads ---"
          START=$(date +%s)

          aws s3 cp /tmp/500mb-1.bin "s3://${R2_BUCKET}/bench-par-${RUNNER_NAME:-unknown}-1.bin" \
            --endpoint-url "$R2_ENDPOINT" 2>&1 &
          PID1=$!
          aws s3 cp /tmp/500mb-2.bin "s3://${R2_BUCKET}/bench-par-${RUNNER_NAME:-unknown}-2.bin" \
            --endpoint-url "$R2_ENDPOINT" 2>&1 &
          PID2=$!
          aws s3 cp /tmp/500mb-3.bin "s3://${R2_BUCKET}/bench-par-${RUNNER_NAME:-unknown}-3.bin" \
            --endpoint-url "$R2_ENDPOINT" 2>&1 &
          PID3=$!

          # Monitor memory while uploads run
          while kill -0 $PID1 2>/dev/null || kill -0 $PID2 2>/dev/null || kill -0 $PID3 2>/dev/null; do
            echo "$(date +%T) $(free -m | grep Mem)"
            sleep 5
          done

          wait $PID1; echo "Upload 1 exit: $?"
          wait $PID2; echo "Upload 2 exit: $?"
          wait $PID3; echo "Upload 3 exit: $?"

          END=$(date +%s)
          echo "Total wall time: $((END - START))s"
          free -m | grep Mem

      - name: Cleanup R2 test files
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          aws s3 rm "s3://${R2_BUCKET}/" --recursive --endpoint-url "$R2_ENDPOINT" || true
          wait
