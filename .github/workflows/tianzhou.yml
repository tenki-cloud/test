name: Network Benchmark
on: workflow_dispatch

jobs:
  bench:
    strategy:
      matrix:
        runner: [ubuntu-latest, tenki-standard-small-2c-4g]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Latency to Cloudflare
        run: |
          ping -c 20 1.1.1.1 | tail -1
          curl -o /dev/null -s -w "DNS: %{time_namelookup}s\nConnect: %{time_connect}s\nTTFB: %{time_starttransfer}s\nTotal: %{time_total}s\n" \
            "https://speed.cloudflare.com/__down?bytes=1"

      - name: Bandwidth (upload)
        run: |
          dd if=/dev/urandom of=/tmp/100mb.bin bs=1M count=100 2>/dev/null
          dd if=/dev/urandom of=/tmp/500mb.bin bs=1M count=500 2>/dev/null
          echo "=== 100MB upload ==="
          curl -o /dev/null -s -w "Speed: %{speed_upload} bytes/sec\nTime: %{time_total}s\n" --data-binary @/tmp/100mb.bin https://speed.cloudflare.com/__up
          echo "=== 500MB upload ==="
          curl -o /dev/null -s -w "Speed: %{speed_upload} bytes/sec\nTime: %{time_total}s\n" --data-binary @/tmp/500mb.bin https://speed.cloudflare.com/__up

      - name: Bandwidth (download)
        run: |
          curl -o /dev/null -s -w "Speed: %{speed_download} bytes/sec\nTotal: %{time_total}s\n" \
            "https://speed.cloudflare.com/__down?bytes=500000000"

      - name: Connection stability (sustained transfer)
        run: |
          for i in $(seq 1 10); do
            TIME=$(curl -o /dev/null -s -w "%{time_total}" --max-time 120 --data-binary @/tmp/100mb.bin https://speed.cloudflare.com/__up)
            echo "Run $i: ${TIME}s"
          done

      - name: MTU / packet loss
        run: |
          ping -c 100 -q 1.1.1.1
          traceroute -m 20 1.1.1.1 || true
